# ----------------------------------------------------------------
# Orchestrates the two services:
#   api  — FastAPI backend on :8000 (talks to the remote Postgres)
#   web  — Next.js frontend on :3000 (proxies /api/* to the api service)
#
# Usage:
#   1. cp .env.example .env   (fill in real PG_* and GROQ_API_KEY values)
#   2. docker compose up -d --build
#   3. open http://localhost:3000   (API docs at http://localhost:8000/docs)
# ----------------------------------------------------------------

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: customer-journey-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./customer_journey_frontend/customer_journey/frontend
      dockerfile: Dockerfile
    image: customer-journey-web
    environment:
      # Next's server-side proxy forwards /api/* to the backend container
      - API_PROXY_TARGET=http://api:8009
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
